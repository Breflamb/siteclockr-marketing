# nginx server block for the SiteClockr marketing site (www.siteclockr.com).
# Install: /etc/nginx/sites-available/siteclockr-marketing (symlinked into sites-enabled).
# Cert: certbot certonly --nginx -d siteclockr.com -d www.siteclockr.com

server {
    listen 80;
    listen [::]:80;
    server_name siteclockr.com www.siteclockr.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name siteclockr.com www.siteclockr.com;

    ssl_certificate /etc/letsencrypt/live/siteclockr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siteclockr.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/siteclockr-marketing;
    index index.html;

    # Static export uses trailingSlash — serve real files only; unknown paths → 404.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Long-cache the content-hashed Next.js assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
